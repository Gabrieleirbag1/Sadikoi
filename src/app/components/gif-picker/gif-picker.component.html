<div class="gif-picker">
  <div>
    <button (click)="setView('recent')">{{ 'gifPicker.recent' | translate }}</button>
    <button (click)="setView('trending')">{{ 'gifPicker.trending' | translate }}</button>
  </div>
  <input
    type="text"
    [placeholder]="'gifPicker.searchKlipy' | translate"
    [(ngModel)]="searchQuery"
    (input)="onSearchInput()"
    class="gif-search-input"
  />

  <div class="gif-grid" [class.loading]="loading()">
    @if (loading()) {
      <div class="gif-spinner">{{ 'gifPicker.loading' | translate }}</div>
    }
    @for (gif of gifs(); track gif.id) {
      <img
        [src]="getPreviewUrl(gif)"
        [alt]="gif.title"
        (click)="selectGif(gif)"
        class="gif-thumb"
        loading="lazy"
      />
    } @empty {
      @if (!loading()) {
        <p class="gif-empty">{{ 'gifPicker.noGifsFound' | translate }}</p>
      }
    }
  </div>
</div>
