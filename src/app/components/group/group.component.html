<p>group.component works!</p>
{{group()?.name}}
@if (group()) {
  <app-question [group]="group()"></app-question>

  <button (click)="fetchInvitation()">{{ 'group.getGroupInvitation' | translate }}</button>
  @if (invitation()) {
    <p>{{ 'group.groupInvitation' | translate }} {{ invitation() }}</p>
  }
} @else {
    <p>{{ 'group.loadingGroup' | translate }}</p>
}
<app-group-options [group]="group()" (groupChange)="group.set($event)" />
