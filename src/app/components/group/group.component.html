<p>group.component works!</p>
{{group()?.name}}
@if (group()) {
  <app-question [group]="group()"></app-question>

  <button (click)="fetchInvitation()">Get Group Invitation</button>
  @if (invitation()) {
    <p>Group Invitation: {{ invitation() }}</p>
  }
} @else {
    <p>Loading group...</p>
}
<app-group-options [group]="group()"></app-group-options>
