<div>
  @if (isAuthenticated) {
  <p>You are logged in!</p>
  <button (click)="logout()"> Logout </button>
  } @else {
  <button (click)="setDisplayMode('register')"> Register </button>
  <br>
  <button (click)="setDisplayMode('login')"> Login </button>
  }
</div>

@if (!isAuthenticated) {
  @if (displayMode() === 'register') {
  <div>
    <label for="username">Username:</label>
    <input id="username" name="username" #username type="text" />

    <label for="email">Email:</label>
    <input id="email" name="email" #email type="email" />

    <label for="password">Password:</label>
    <input id="password" name="password" #password type="password" />

    <label for="login"> Login:</label>
    <input id="login" name="login" #login type="checkbox" checked/>

    <button type="submit" (click)="register(username.value, password.value, email.value, login.checked)">Register</button>
  </div> }
  @else if (displayMode() === 'login') {
    <div>
    <label for="username">Username or Email:</label>
    <input id="username" name="username" #username type="text" />
    <label for="password">Password:</label>
    <input id="password" name="password" #password type="password" />
    <input type="checkbox" id="remember" name="remember" #remember>
    <label for="remember">Remember Me</label>
    <button type="submit" (click)="login(username.value, password.value, remember.checked)">Login</button>
    </div>
    <app-google-login></app-google-login>
  }
}
