<div>
  @if (isAuhenticated) {
  <p>You are logged in!</p>
  <button (click)="logout()"> Logout </button>
  } @else {
  <button (click)="setDisplayMode('register')"> Register </button>
  <br>
  <button (click)="setDisplayMode('login')"> Login </button>
  }
</div>

@if (!isAuhenticated) {
  @if (displayMode() === 'register') {
  <div>
    <label for="username">Username:</label>
    <input id="username" name="username" #username type="text" />

    <label for="email">Email:</label>
    <input id="email" name="email" #email type="email" />

    <label for="password">Password:</label>
    <input id="password" name="password" #password type="password" />

    <button type="submit" (click)="register(username.value, password.value, email.value)">Register</button>
  </div> }
  @else if (displayMode() === 'login') {
    <div>
    <label for="username">Username or Email:</label>
    <input id="username" name="username" #username type="text" />
    <label for="password">Password:</label>
    <input id="password" name="password" #password type="password" />
    <button type="submit" (click)="login(username.value, password.value)">Login</button>
    </div>
  }
}
