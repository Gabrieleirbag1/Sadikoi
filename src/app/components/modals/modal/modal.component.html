@if (isOpen()) {
  <div class="modal" tabindex="-1" role="dialog" style="display: block">
    <div class="modal-dialog" role="document">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">{{ config().title }}</h5>
          <button type="button" class="close" aria-label="Close" (click)="discard($event)">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>
        <div class="modal-body">
          <p>{{ config().description }}</p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-primary" (click)="save($event)">
            {{ 'modal.save' | translate }}
          </button>
          <button type="button" class="btn btn-secondary" (click)="discard($event)">
            {{ 'modal.close' | translate }}
          </button>
        </div>
      </div>
    </div>
  </div>
}
