<div>
    <label for="title">{{ 'feedback.bugReportTitle' | translate }}</label>
    <input id="title" type="text" #title>

    <label for="description">{{ 'feedback.describeBug' | translate }}</label>
    <textarea id="description" #description></textarea>

    <button (click)="submitBugReport(title.value, description.value)">{{ 'feedback.submitBugReport' | translate }}</button>
</div>
